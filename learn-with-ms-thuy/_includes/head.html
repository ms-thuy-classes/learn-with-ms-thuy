<head>
  <meta charset="UTF-8">
  <!-- Favicon -->
<link rel="icon" type="image/png" sizes="32x32" href="{{ '/assets/images/ms-thuy-logo.png' | relative_url }}">
<link rel="apple-touch-icon" href="{{ '/assets/images/ms-thuy-logo.png' | relative_url }}">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  {% seo %}
  <!-- Ảnh preview mặc định cho toàn bộ website -->
<meta property="og:image" content="{{ '/assets/images/ms-thuy-preview.jpg' | absolute_url }}">
<meta name="twitter:image" content="{{ '/assets/images/ms-thuy-preview.jpg' | absolute_url }}">
<meta name="twitter:card" content="summary_large_image">
<meta property="og:title" content="{{ site.title }}">
<meta property="og:description" content="{{ site.description }}">
<meta property="og:type" content="website">
</head>
