---
layout: default
title: IELTS Speaking - Ms. Thúy
permalink: /ielts/speaking/
---

<div class="container" style="max-width: 1400px; margin: 0 auto; padding: 6rem 2rem 2rem;">
  <h1 style="font-size: 3rem; margin-bottom: 1rem;">
    <i class="fas fa-book-open"></i> IELTS speaking
  </h1>
  <p style="font-size: 1.2rem; color: #5a5a6e; margin-bottom: 3rem;">Master your speaking skills with authentic IELTS practice tests</p>
  
  <div id="speaking-posts">
    <!-- Loading skeleton -->
    <div class="horizontal-scroll">
      <div class="skeleton" style="width: 320px; height: 400px; border-radius: var(--border-radius);"></div>
      <div class="skeleton" style="width: 320px; height: 400px; border-radius: var(--border-radius);"></div>
      <div class="skeleton" style="width: 320px; height: 400px; border-radius: var(--border-radius);"></div>
    </div>
  </div>
  
  <!-- Pagination -->
  <div class="pagination" id="pagination">
    <button id="prev-btn" disabled><i class="fas fa-chevron-left"></i> Previous</button>
    <span id="page-info" style="padding: 0.5rem 1rem;">Page 1</span>
    <button id="next-btn">Next <i class="fas fa-chevron-right"></i></button>
  </div>
</div>

<script>
  // Declare variables
  var allPosts = [];
  var currentPage = 1;
  var postsPerPage = 8;
  var totalPages = 0;
  
  // Get posts from Jekyll
  var postsData = [
    {% assign speaking_posts = site.categories["IELTS speaking"] %}
    {% for post in speaking_posts %}
    {
      title: {{ post.title | jsonify }},
      url: {{ post.url | relative_url | jsonify }},
      excerpt: {{ post.excerpt | strip_html | truncatewords: 20 | jsonify }},
      date: {{ post.date | date: "%b %d, %Y" | jsonify }},
      image: {{ post.featured_image | relative_url | jsonify }},
      category: "speaking"
    }{% unless forloop.last %},{% endunless %}
    {% endfor %}
  ];
  
  allPosts = postsData;
  totalPages = Math.ceil(allPosts.length / postsPerPage);
  
  // Helper function to escape HTML
  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/&/g, '&amp;')
              .replace(/</g, '&lt;')
              .replace(/>/g, '&gt;')
              .replace(/"/g, '&quot;')
              .replace(/'/g, '&#39;');
  }
  
  // Function to render posts
  function renderPosts() {
    var start = (currentPage - 1) * postsPerPage;
    var end = start + postsPerPage;
    var pagePosts = allPosts.slice(start, end);
    
    var container = document.getElementById('speaking-posts');
    if (!container) return;
    
    if (pagePosts.length === 0) {
      container.innerHTML = '<div style="text-align: center; padding: 4rem; background: white; border-radius: var(--border-radius);">' +
        '<i class="fas fa-folder-open" style="font-size: 4rem; color: #ccc; margin-bottom: 1rem;"></i>' +
        '<p>No IELTS speaking posts available yet.</p>' +
        '<p style="font-size: 0.9rem; margin-top: 0.5rem;">Add posts with <strong>categories: IELTS</strong> and <strong>subcategory: speaking</strong></p>' +
        '</div>';
      var paginationEl = document.getElementById('pagination');
      if (paginationEl) paginationEl.style.display = 'none';
      return;
    }
    
    var html = '<div class="horizontal-scroll" id="horizontal-scroll">';
    for (var i = 0; i < pagePosts.length; i++) {
      var post = pagePosts[i];
      var imageHtml = '';
      if (post.image && post.image !== '') {
        imageHtml = '<img src="' + post.image + '" alt="' + escapeHtml(post.title) + '" style="width: 100%; height: 200px; object-fit: cover;" loading="lazy">';
      } else {
        imageHtml = '<div style="height: 200px; background: linear-gradient(135deg, #667eea, #764ba2); display: flex; align-items: center; justify-content: center;">' +
          '<i class="fas fa-book-open" style="font-size: 4rem; color: white; opacity: 0.5;"></i>' +
          '</div>';
      }
      
      html += '<div class="horizontal-card reveal">' +
        imageHtml +
        '<div class="card-content">' +
        '<span class="post-category"><i class="fas fa-book"></i> IELTS speaking</span>' +
        '<h3><a href="' + post.url + '">' + escapeHtml(post.title) + '</a></h3>' +
        '<p class="post-date"><i class="far fa-calendar-alt"></i> ' + post.date + '</p>' +
        '<p>' + escapeHtml(post.excerpt) + '</p>' +
        '<a href="' + post.url + '" class="btn-sm">Start Practice <i class="fas fa-arrow-right"></i></a>' +
        '</div>' +
        '</div>';
    }
    html += '</div>';
    container.innerHTML = html;
    
    // Add touch swipe support
    addSwipeSupport();
    updatePaginationButtons();
  }
  
  // Function to add swipe support
  function addSwipeSupport() {
    var scrollContainer = document.getElementById('horizontal-scroll');
    if (!scrollContainer) return;
    
    var isDown = false;
    var startX;
    var scrollLeft;
    
    scrollContainer.addEventListener('mousedown', function(e) {
      isDown = true;
      startX = e.pageX - scrollContainer.offsetLeft;
      scrollLeft = scrollContainer.scrollLeft;
    });
    
    scrollContainer.addEventListener('mouseleave', function() {
      isDown = false;
    });
    
    scrollContainer.addEventListener('mouseup', function() {
      isDown = false;
    });
    
    scrollContainer.addEventListener('mousemove', function(e) {
      if (!isDown) return;
      e.preventDefault();
      var x = e.pageX - scrollContainer.offsetLeft;
      var walk = (x - startX) * 2;
      scrollContainer.scrollLeft = scrollLeft - walk;
    });
  }
  
  // Function to update pagination buttons
  function updatePaginationButtons() {
    var pageInfo = document.getElementById('page-info');
    var prevBtn = document.getElementById('prev-btn');
    var nextBtn = document.getElementById('next-btn');
    
    if (pageInfo) pageInfo.textContent = 'Page ' + currentPage + ' of ' + totalPages;
    if (prevBtn) prevBtn.disabled = (currentPage === 1);
    if (nextBtn) nextBtn.disabled = (currentPage === totalPages);
  }
  
  // Event listeners for pagination
  var prevButton = document.getElementById('prev-btn');
  var nextButton = document.getElementById('next-btn');
  
  if (prevButton) {
    prevButton.addEventListener('click', function() {
      if (currentPage > 1) {
        currentPage--;
        renderPosts();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    });
  }
  
  if (nextButton) {
    nextButton.addEventListener('click', function() {
      if (currentPage < totalPages) {
        currentPage++;
        renderPosts();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    });
  }
  
  // Initialize on page load
  document.addEventListener('DOMContentLoaded', function() {
    setTimeout(function() {
      renderPosts();
    }, 100);
  });
</script>

<style>
  #horizontal-scroll {
    display: flex;
    overflow-x: auto;
    gap: 1.5rem;
    padding: 1rem 0.5rem;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
    cursor: grab;
  }
  
  #horizontal-scroll:active {
    cursor: grabbing;
  }
  
  .horizontal-card {
    flex: 0 0 320px;
    scroll-snap-align: start;
  }
  
  .skeleton {
    background: linear-gradient(90deg, #e0e0e0 25%, #f0f0f0 50%, #e0e0e0 75%);
    background-size: 200% 100%;
    animation: loading 1.5s infinite;
    border-radius: var(--border-radius);
  }
  
  @keyframes loading {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }
</style>
