---
layout: default
title: IELTS Listening - Ms. Thúy
permalink: /ielts/listening/
---

<div class="listening-page">
  <header class="page-header">
    <h1 class="page-title"><i class="fas fa-headphones"></i> IELTS Listening</h1>
    <p class="page-subtitle">Master your listening skills with authentic IELTS practice tests</p>
  </header>

  <main id="listening-posts" class="posts-grid">
    <!-- Skeleton Loaders -->
    <div class="skeleton-card"></div>
    <div class="skeleton-card"></div>
    <div class="skeleton-card"></div>
    <div class="skeleton-card"></div>
    <div class="skeleton-card"></div>
    <div class="skeleton-card"></div>
  </main>

  <nav class="pagination-container" id="pagination" aria-label="Post pagination"></nav>
</div>

<style>
  :root {
    --pastel-gradient: linear-gradient(135deg, #f374c8 0%, #efebec 100%);
    --pastel-accent: #74b9ff;
    --card-bg: #ffffff;
    --text-primary: #2d3436;
    --text-secondary: #636e72;
    --border-radius: 16px;
    --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.05);
    --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.08);
    --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .listening-page {
    max-width: 1280px;
    margin: 0 auto;
    padding: 4rem 1.5rem 6rem;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  }

  .page-header { text-align: center; margin-bottom: 3.5rem; }

  ..page-title {
  font-size: clamp(2rem, 5vw, 3rem);
  margin: 0 0 0.75rem;
  color: #981265; /* Màu chữ đậm, dễ đọc. Bạn có thể đổi thành #5a6a80 hoặc màu pastel khác */
  display: inline-flex;
  align-items: center;
  gap: 0.75rem;
}
  .page-subtitle {
    font-size: 1.1rem;
    color: var(--text-secondary);
    max-width: 600px;
    margin: 0 auto;
    line-height: 1.6;
  }

  .posts-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 2rem;
    margin-bottom: 3rem;
  }

  .post-card {
    background: var(--card-bg);
    border-radius: var(--border-radius);
    overflow: hidden;
    box-shadow: var(--shadow-sm);
    transition: var(--transition);
    display: flex;
    flex-direction: column;
    animation: fadeInUp 0.5s ease forwards;
    opacity: 0;
    transform: translateY(10px);
  }
  .post-card:hover { transform: translateY(-6px); box-shadow: var(--shadow-md); }
  .post-card:nth-child(1) { animation-delay: 0.05s; }
  .post-card:nth-child(2) { animation-delay: 0.1s; }
  .post-card:nth-child(3) { animation-delay: 0.15s; }
  .post-card:nth-child(4) { animation-delay: 0.2s; }
  .post-card:nth-child(5) { animation-delay: 0.25s; }
  .post-card:nth-child(6) { animation-delay: 0.3s; }
  .post-card:nth-child(7) { animation-delay: 0.35s; }
  .post-card:nth-child(8) { animation-delay: 0.4s; }
  .post-card:nth-child(9) { animation-delay: 0.45s; }
  .post-card:nth-child(10) { animation-delay: 0.5s; }

  @keyframes fadeInUp {
    to { opacity: 1; transform: translateY(0); }
  }

  .post-card-image {
    width: 100%;
    height: 200px;
    object-fit: cover;
    background: var(--pastel-gradient);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .post-card-image i { font-size: 3rem; color: #fff; opacity: 0.6; }

  .post-card-content { padding: 1.5rem; display: flex; flex-direction: column; flex: 1; }

  .post-category {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    background: #f0f4f8;
    color: #5a6a80;
    padding: 0.35rem 0.75rem;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 600;
    width: fit-content;
    margin-bottom: 0.75rem;
  }

  .post-card h3 { margin: 0 0 0.75rem; font-size: 1.25rem; line-height: 1.4; }
  .post-card h3 a { color: var(--text-primary); text-decoration: none; transition: color 0.2s; }
  .post-card h3 a:hover { color: var(--pastel-accent); }

  .post-meta { display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.75rem; }

  .post-excerpt {
    color: var(--text-secondary);
    font-size: 0.95rem;
    line-height: 1.6;
    margin: 0 0 1.25rem;
    flex: 1;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .post-cta {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    background: var(--pastel-gradient);
    color: #2d3436;
    font-weight: 600;
    padding: 0.75rem 1.25rem;
    border-radius: 10px;
    text-decoration: none;
    transition: var(--transition);
    border: none;
    cursor: pointer;
    width: fit-content;
  }
  .post-cta:hover { opacity: 0.9; transform: translateX(4px); }

  .skeleton-card {
    background: linear-gradient(90deg, #f0f0f0 25%, #f8f8f8 50%, #f0f0f0 75%);
    background-size: 200% 100%;
    animation: loading 1.5s infinite;
    border-radius: var(--border-radius);
    height: 420px;
  }
  @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

  .empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 4rem 2rem;
    background: white;
    border-radius: var(--border-radius);
    box-shadow: var(--shadow-sm);
  }
  .empty-state i { font-size: 3.5rem; color: #cbd5e0; margin-bottom: 1rem; display: block; }

  .pagination-container {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin-top: 2rem;
  }

  .pagination-btn {
    min-width: 40px;
    height: 40px;
    padding: 0 1rem;
    border: 1px solid #e0e0e0;
    background: white;
    border-radius: 10px;
    cursor: pointer;
    font-weight: 500;
    color: var(--text-primary);
    transition: var(--transition);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .pagination-btn:hover:not(:disabled) { background: #f5f7fa; border-color: #cbd5e0; }
  .pagination-btn.active {
    background: var(--pastel-gradient);
    border-color: transparent;
    color: #2d3436;
    font-weight: 700;
    box-shadow: 0 4px 12px rgba(168, 237, 234, 0.4);
  }
  .pagination-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .pagination-ellipsis { color: var(--text-secondary); padding: 0 0.25rem; user-select: none; }

  @media (max-width: 768px) {
    .posts-grid { grid-template-columns: 1fr; }
    .page-title { font-size: 2rem; }
  }
</style>

<script>
(function() {
  var postsData = [
    {% assign listening_posts = site.categories["IELTS Listening"] %}
    {% for post in listening_posts %}
    {
      title: {{ post.title | jsonify }},
      url: {{ post.url | relative_url | jsonify }},
      excerpt: {{ post.excerpt | strip_html | truncatewords: 20 | jsonify }},
      date: {{ post.date | date: "%b %d, %Y" | jsonify }},
      image: {{ post.featured_image | relative_url | jsonify }}
    }{% unless forloop.last %},{% endunless %}
    {% endfor %}
  ];

  var currentPage = 1;
  var postsPerPage = 10;
  var totalPages = Math.ceil(postsData.length / postsPerPage);
  var maxVisiblePages = 5;

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
              .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  function renderPosts() {
    var container = document.getElementById('listening-posts');
    if (!container) return;

    if (postsData.length === 0) {
      container.innerHTML = '<div class="empty-state"><i class="fas fa-folder-open"></i><p>Chưa có bài viết IELTS Listening nào.</p></div>';
      document.getElementById('pagination').style.display = 'none';
      return;
    }

    var start = (currentPage - 1) * postsPerPage;
    var pagePosts = postsData.slice(start, start + postsPerPage);
    var html = '';

    pagePosts.forEach(function(post) {
      var imgHtml = post.image ? 
        '<img class="post-card-image" src="' + post.image + '" alt="' + escapeHtml(post.title) + '" loading="lazy">' : 
        '<div class="post-card-image"><i class="fas fa-headphones"></i></div>';
      
      html += '<article class="post-card">' +
        imgHtml +
        '<div class="post-card-content">' +
        '<span class="post-category"><i class="fas fa-microphone-alt"></i> Listening</span>' +
        '<h3><a href="' + post.url + '">' + escapeHtml(post.title) + '</a></h3>' +
        '<div class="post-meta"><i class="far fa-calendar-alt"></i> ' + post.date + '</div>' +
        '<p class="post-excerpt">' + escapeHtml(post.excerpt) + '</p>' +
        '<a href="' + post.url + '" class="post-cta">Start Practice <i class="fas fa-arrow-right"></i></a>' +
        '</div></article>';
    });

    container.innerHTML = html;
    renderPagination();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function renderPagination() {
    var container = document.getElementById('pagination');
    if (totalPages <= 1) { container.style.display = 'none'; return; }
    container.style.display = 'flex';
    container.innerHTML = '';

    var createBtn = function(text, page, icon, disabled) {
      var btn = document.createElement('button');
      btn.className = 'pagination-btn' + (disabled ? '' : (page === currentPage ? ' active' : ''));
      btn.innerHTML = icon || text;
      btn.disabled = disabled;
      btn.addEventListener('click', function() { if (!disabled) changePage(page); });
      return btn;
    };

    container.appendChild(createBtn(null, currentPage - 1, '<i class="fas fa-chevron-left"></i>', currentPage === 1));

    var startPage = Math.max(1, currentPage - Math.floor(maxVisiblePages / 2));
    var endPage = Math.min(totalPages, startPage + maxVisiblePages - 1);
    if (endPage - startPage + 1 < maxVisiblePages) startPage = Math.max(1, endPage - maxVisiblePages + 1);

    if (startPage > 1) {
      container.appendChild(createBtn('1', 1));
      if (startPage > 2) container.appendChild(document.createTextNode('...'));
    }

    for (var i = startPage; i <= endPage; i++) {
      container.appendChild(createBtn(i, i, i, false));
    }

    if (endPage < totalPages) {
      if (endPage < totalPages - 1) container.appendChild(document.createTextNode('...'));
      container.appendChild(createBtn(totalPages, totalPages));
    }

    container.appendChild(createBtn(null, currentPage + 1, '<i class="fas fa-chevron-right"></i>', currentPage === totalPages));
  }

  function changePage(page) {
    if (page < 1 || page > totalPages) return;
    currentPage = page;
    renderPosts();
  }

  document.addEventListener('DOMContentLoaded', function() {
    setTimeout(renderPosts, 100);
  });
})();
</script>
