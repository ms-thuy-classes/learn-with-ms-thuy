<script>
(function() {
  var postsData = [
    
    
    {
      title: "🌿 Listening Lesson: Gardening Vocabulary in Action",
      url: "/learn-with-ms-thuy/ielts%20listening/listening/",
      excerpt: "Practice listening with a real-life story about gardening. Learn vocabulary, take a quiz, and check your answers with a pie...",
      date: "Apr 20, 2025",
      image: "https://images.pexels.com/photos/1264247/pexels-photo-1264247.jpeg"
    },
    
    {
      title: "Cách rèn luyện kỹ năng nghe tiếng Anh hiệu quả",
      url: "/learn-with-ms-thuy/ielts%20listening/cach-luyen-nghe-tieng-anh-hieu-qua/",
      excerpt: "Bạn nghe mãi không tiến bộ? Khám phá 5 phương pháp luyện nghe tiếng Anh chủ động, dễ áp dụng,...",
      date: "Apr 19, 2025",
      image: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSqBt4t0dnQtXgj6kq_NIQyhs4QNhY3QYUO-g&s"
    }
    
  ];

  var currentPage = 1;
  var postsPerPage = 10;
  var totalPages = Math.ceil(postsData.length / postsPerPage);
  var maxVisiblePages = 5;

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
              .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  function renderPosts() {
    var container = document.getElementById('listening-posts');
    if (!container) return;

    if (postsData.length === 0) {
      container.innerHTML = '<div class="empty-state"><i class="fas fa-folder-open"></i><p>Chưa có bài viết IELTS Listening nào.</p></div>';
      document.getElementById('pagination').style.display = 'none';
      return;
    }

    var start = (currentPage - 1) * postsPerPage;
    var pagePosts = postsData.slice(start, start + postsPerPage);
    var html = '';

    pagePosts.forEach(function(post) {
      var imgHtml = post.image ? 
        '<img class="post-card-image" src="' + post.image + '" alt="' + escapeHtml(post.title) + '" loading="lazy">' : 
        '<div class="post-card-image"><i class="fas fa-headphones"></i></div>';
      
      html += '<article class="post-card">' +
        imgHtml +
        '<div class="post-card-content">' +
        '<span class="post-category"><i class="fas fa-microphone-alt"></i> Listening</span>' +
        '<h3><a href="' + post.url + '">' + escapeHtml(post.title) + '</a></h3>' +
        '<div class="post-meta"><i class="far fa-calendar-alt"></i> ' + post.date + '</div>' +
        '<p class="post-excerpt">' + escapeHtml(post.excerpt) + '</p>' +
        '<a href="' + post.url + '" class="post-cta">Start Practice <i class="fas fa-arrow-right"></i></a>' +
        '</div></article>';
    });

    container.innerHTML = html;
    renderPagination();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function renderPagination() {
    var container = document.getElementById('pagination');
    if (totalPages <= 1) { container.style.display = 'none'; return; }
    container.style.display = 'flex';
    container.innerHTML = '';

    var createBtn = function(text, page, icon, disabled) {
      var btn = document.createElement('button');
      btn.className = 'pagination-btn' + (disabled ? '' : (page === currentPage ? ' active' : ''));
      btn.innerHTML = icon || text;
      btn.disabled = disabled;
      btn.addEventListener('click', function() { if (!disabled) changePage(page); });
      return btn;
    };

    container.appendChild(createBtn(null, currentPage - 1, '<i class="fas fa-chevron-left"></i>', currentPage === 1));

    var startPage = Math.max(1, currentPage - Math.floor(maxVisiblePages / 2));
    var endPage = Math.min(totalPages, startPage + maxVisiblePages - 1);
    if (endPage - startPage + 1 < maxVisiblePages) startPage = Math.max(1, endPage - maxVisiblePages + 1);

    if (startPage > 1) {
      container.appendChild(createBtn('1', 1));
      if (startPage > 2) container.appendChild(document.createTextNode('...'));
    }

    for (var i = startPage; i <= endPage; i++) {
      container.appendChild(createBtn(i, i, i, false));
    }

    if (endPage < totalPages) {
      if (endPage < totalPages - 1) container.appendChild(document.createTextNode('...'));
      container.appendChild(createBtn(totalPages, totalPages));
    }

    container.appendChild(createBtn(null, currentPage + 1, '<i class="fas fa-chevron-right"></i>', currentPage === totalPages));
  }

  function changePage(page) {
    if (page < 1 || page > totalPages) return;
    currentPage = page;
    renderPosts();
  }

  document.addEventListener('DOMContentLoaded', function() {
    setTimeout(renderPosts, 100);
  });
})();
</script>

  <!-- Scripts -->
  <script>
    // Navbar scroll effect
    window.addEventListener('scroll', function() {
      const navbar = document.getElementById('navbar');
      if (window.scrollY > 50) {
        navbar.classList.add('scrolled');
      } else {
        navbar.classList.remove('scrolled');
      }
    });
    
    // Hamburger menu
    const hamburger = document.getElementById('hamburger');
    const navMenu = document.getElementById('nav-menu');
    
    hamburger.addEventListener('click', () => {
      navMenu.classList.toggle('active');
    });
    
    // Mobile dropdowns
    const ieltsDropdown = document.getElementById('ielts-dropdown');
    const chineseDropdown = document.getElementById('chinese-dropdown');
    
    if (window.innerWidth <= 768) {
      ieltsDropdown.addEventListener('click', (e) => {
        e.preventDefault();
        const parent = ieltsDropdown.closest('.nav-item');
        parent.classList.toggle('active');
      });
      
      chineseDropdown.addEventListener('click', (e) => {
        e.preventDefault();
        const parent = chineseDropdown.closest('.nav-item');
        parent.classList.toggle('active');
      });
    }
    
    // Scroll reveal animation
    const revealElements = document.querySelectorAll('.reveal');
    
    const revealObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('active');
        }
      });
    }, { threshold: 0.1 });
    
    revealElements.forEach(el => revealObserver.observe(el));
    
    // Add reveal class to sections
    document.querySelectorAll('section').forEach(section => {
      section.classList.add('reveal');
    });
  </script>
