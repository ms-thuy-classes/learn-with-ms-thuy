---
layout: default
---
<article class="post-container">
  <div class="post-header">
    <h1>{{ page.title }}</h1>
    <div class="post-meta">
      <span>📅 {{ page.date | date: "%B %d, %Y" }}</span>
      <span>📂 Category: <a href="{{ site.baseurl }}/{{ page.categories | first | downcase }}.html">{{ page.categories | first }}</a></span>
      <span>🏷️ Tags: {{ page.tags | join: ", " }}</span>
    </div>
    {% if page.featured_image %}
      <img src="{{ page.featured_image | relative_url }}" alt="{{ page.title }}" class="featured-img">
    {% endif %}
  </div>
  <div class="post-content">
    {{ content }}
  </div>
</article>
